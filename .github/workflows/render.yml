name: render
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenSCAD
        run: |
          sudo apt-get update
          sudo apt-get install -y openscad xvfb
      - name: Render all projects
        run: xvfb-run -a make render-all
      - name: Commit changed renders
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/*/renders/*.png
          if git diff --cached --quiet; then
            echo "No render changes."
          else
            git commit -m "chore: regenerate project renders [skip ci]"
            git push
          fi
